# ---------------------------------------------------------------------------
# Publication data. This is the single source of truth for the Publications
# page; index.qmd reads it through Quarto's listing engine.
#
# To add a paper, append an entry. Field reference:
#
#   title       required. Sentence case, as published.
#   author      required. Display string, not a list, so that "et al." and
#               "(incl. Gumińska N.)" render exactly as written.
#   date        required. YYYY-MM-DD. Only the year is displayed, but the full
#               date controls sort order within a year.
#   journal     shown under the author line.
#   doi         shown as a linked DOI. Omit if there is none.
#   path        where the card links to. Use the DOI URL.
#   categories  drive the filter chips. Keep the vocabulary small and reuse it:
#               First author | Co-author | Journal article | Preprint |
#               Method | Nanopore | poly(A) | Euglenids | mRNA therapeutics
#   description optional one-line plain-language summary.
#
# VERIFY BEFORE PUBLISHING: entries below the marked line were reconstructed
# from the CV text and are missing DOIs. Fill them in, or regenerate the whole
# file from references.bib with scripts/generate-publications.R.
# ---------------------------------------------------------------------------

