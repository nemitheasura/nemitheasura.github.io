# ---------------------------------------------------------------------------
# The publication list. This file is the single source of truth: the listing on
# publications/index.qmd is generated from it, and so is the RSS feed.
#
# Every entry was transcribed from NG_CV_2026.docx. Titles, author strings and
# DOIs come from that document rather than from memory. 17 items, 9 of them
# first-author.
#
# VERIFICATION, July 2026. Ten of the seventeen DOIs were checked against an
# independent source (the author's University of Warsaw IBE publication page,
# the RNA journal site, Crossref and PubMed) and all ten matched the CV. The
# remaining seven are transcribed from the CV only and have not been resolved:
#
#   10.1002/yea.70023            Yeast
#   10.1261/rna.080240.124       RNA (Tent2)
#   10.1038/s41597-024-04226-8   Scientific Data
#   10.1101/2024.11.14.623596    bioRxiv preprint
#   10.1126/sciadv.add9468       Science Advances (TENT5)
#   10.1126/sciadv.abn2706       Science Advances (trypanosomes)
#   10.1038/s41467-025-57787-6   Nature Communications (ninetails)
#
# ONE CORRECTION was made against the CV: the RNA 2025 paper is published as
# "Polyadenylation landscape OF in vivo long-term potentiation", not "after".
# RNA 31(12), 1712-1734. The wording here follows the journal.
#
# TWO PAPERS ARE MISSING, both absent from the CV and both Polish-language
# reviews in Postępy Biochemii. They are deliberately NOT added here, because
# leaving them off an English-language CV may well be intentional. Add them if
# you want them:
#
#   Gumińska N., Milanowski R. "Charakterystyka kolistych DNA u Eukarya",
#     Postępy Biochemii 68(2):129-141 (2022), doi 10.18388/pb.2021_423
#   Ignatenko A., Gumińska N., Milanowski R. "Mechanizmy utraty i nabywania
#     intronów spliceosomalnych", Postępy Biochemii 65(4):289-298 (2019),
#     doi 10.18388/pb.2019_292
#
# Fields:
#   title       required
#   author      required, a display string rather than a list
#   date        required, YYYY-MM-DD. Only the year is shown; month and day
#               control sort order within a year, so approximate is fine.
#   journal     shown under the title
#   doi         shown as a monospace line
#   path        where the card links. Always the doi.org resolver.
#   categories  drives the filter chips. Keep the vocabulary small and reuse
#               existing terms: every new term adds a chip.
#   description one plain sentence. Optional, but worth writing.
#
# "poly(A)" is quoted because a bare value containing parentheses is ambiguous
# to some YAML parsers, and quoting costs nothing.
# ---------------------------------------------------------------------------

