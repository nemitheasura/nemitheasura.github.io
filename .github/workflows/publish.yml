# ---------------------------------------------------------------------------
# Render the Quarto site and deploy it to GitHub Pages.
#
# Prerequisite, done once in the repository UI:
#   Settings -> Pages -> Build and deployment -> Source = "GitHub Actions"
#
# The site has no executable code cells, so no R or Python setup step is needed;
# this keeps a build to well under a minute. If you later add a `{r}` chunk, add
# r-lib/actions/setup-r and setup-renv before the render step.
# ---------------------------------------------------------------------------
name: Publish site

on:
  push:
    branches: [main]
  # Allows a manual re-deploy from the Actions tab without an empty commit.
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Never let two deploys race. In-progress runs finish, so a deploy is not left
# half-applied.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          version: "1.5.57"   # pinned: "release" can change output between runs

      - name: Render site
        run: quarto render

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
