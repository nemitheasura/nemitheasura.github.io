<!-- ------------------------------------------------------------------------
     Injected into <head> on every page (include-in-header in _quarto.yml).

     Quarto already emits <title>, description, canonical and Open Graph tags
     from page front matter and the `website:` block. What is added here is the
     part Quarto cannot know: authorship, the JSON-LD Person record that
     Google, ORCID scrapers and Scholar use, and the theme colour.

     Keep the JSON-LD in sync with _variables.yml when details change.
     ------------------------------------------------------------------------ -->

<meta name="author" content="Natalia Gumińska">
<meta name="keywords" content="Natalia Gumińska, RNA biology, poly(A) tail,
      nanopore, direct RNA sequencing, bioinformatics, research software, R,
      Python, ninetails, IIMCB">
<meta name="robots" content="index, follow, max-image-preview:large">
<meta name="color-scheme" content="light dark">
<meta name="theme-color" content="#1f6f9c" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#0e151c" media="(prefers-color-scheme: dark)">

<!-- Open Graph image. Quarto sets og:title/og:description per page; only the
     image needs an absolute URL, and it must be absolute to render in previews.

     TODO: this points at og-image.PNG and only assets/img/og-image.svg exists.
     Facebook, LinkedIn, Slack and X will not render an SVG preview. Export the
     SVG to a 1200x630 PNG at assets/img/og-image.png, e.g.

       inkscape assets/img/og-image.svg -w 1200 -h 630 \
                -o assets/img/og-image.png

<!-- ------------------------------------------------------------------------
     Open Sans, self-hosted. Matches the ninetails documentation site, which
     runs Bootswatch Yeti and loads Open Sans from Google Fonts. Served from
     this repository instead, so no visitor IP reaches Google.

     These rules live here, in a raw header include, rather than in the SCSS
     bundle ON PURPOSE. Quarto treats every url(...) in the CSS it compiles as
     a build dependency and copies it, so a missing .woff2 aborted the render
     with an lstat NotFound error. Quarto injects this file verbatim without
     scanning it, so a missing font is now just a 404 and the browser falls
     back to the system stack in --font-body. The build always works.

     The files are optional. To get them:  Rscript scripts/fetch-fonts.R
     then commit assets/fonts/ so the deployed site has them too.

     Paths are root-absolute, correct for a user site served from the domain
     root. On a project site they need a /<repo> prefix.
     --------------------------------------------------------------------- -->
<style>
  /* Variable font: one file covers weights 300-800, so headings keep 640.
     latin-ext is required for ń, ł, ą, ę, ś, ź, ż. Without it "Gumińska",
     "Koźminski" and "Poznań" change typeface mid-word. */
  @font-face {
    font-family: "Open Sans";
    font-style: normal;
    font-weight: 300 800;
    font-display: swap;
    src: url("/assets/fonts/open-sans-latin.woff2") format("woff2");
    unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6,
      U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+2074, U+20AC,
      U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
  }
  @font-face {
    font-family: "Open Sans";
    font-style: normal;
    font-weight: 300 800;
    font-display: swap;
    src: url("/assets/fonts/open-sans-latin-ext.woff2") format("woff2");
    unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7,
      U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F,
      U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F,
      U+A720-A7FF;
  }
  /* True italics. Journal names are set in italic throughout the publications
     page, and a sheared roman looks wrong on a humanist face. */
  @font-face {
    font-family: "Open Sans";
    font-style: italic;
    font-weight: 300 800;
    font-display: swap;
    src: url("/assets/fonts/open-sans-latin-italic.woff2") format("woff2");
    unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6,
      U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+2074, U+20AC,
      U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
  }
  @font-face {
    font-family: "Open Sans";
    font-style: italic;
    font-weight: 300 800;
    font-display: swap;
    src: url("/assets/fonts/open-sans-latin-ext-italic.woff2") format("woff2");
    unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7,
      U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F,
      U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F,
      U+A720-A7FF;
  }
</style>
