<!-- ------------------------------------------------------------------------
     Injected at the end of <body> on every page (include-after-body).

     Three small behaviours, no dependencies, no framework. Everything degrades:
     with JavaScript disabled the reveal animation is skipped (content stays
     visible), the gallery links open the full image directly, and the year
     stamp falls back to the value already in the HTML.
     ------------------------------------------------------------------------ -->

<noscript>
  <style>.reveal { opacity: 1 !important; transform: none !important; }</style>
</noscript>

<div class="lightbox" id="lightbox" role="dialog" aria-modal="true"
     aria-label="Image preview" hidden>
  <button class="lightbox-close" type="button" aria-label="Close preview">&times;</button>
  <div>
    <img id="lightbox-img" src="" alt="">
    <p class="lightbox-caption" id="lightbox-caption"></p>
  </div>
</div>

<script>
(function () {
  "use strict";

  var reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

  // -- 1. Scroll reveal ----------------------------------------------------
  // One observer for the whole page. Elements unobserve themselves after
  // firing, so this costs nothing after first scroll-through.
  function initReveal() {
    var targets = document.querySelectorAll(".reveal");
    if (!targets.length) return;

    if (reduceMotion || !("IntersectionObserver" in window)) {
      targets.forEach(function (el) { el.classList.add("is-visible"); });
      return;
    }

    var observer = new IntersectionObserver(function (entries) {
      entries.forEach(function (entry) {
        if (!entry.isIntersecting) return;
        entry.target.classList.add("is-visible");
        observer.unobserve(entry.target);
      });
    }, { rootMargin: "0px 0px -8% 0px", threshold: 0.06 });

    targets.forEach(function (el) { observer.observe(el); });
  }

  // -- 2. Lightbox ---------------------------------------------------------
  // Delegated click handling, so gallery items added later still work.
  // Focus is moved to the close button on open and returned to the trigger on
  // close; Escape and backdrop clicks both dismiss.
  function initLightbox() {
    var box = document.getElementById("lightbox");
    if (!box) return;

    var img = document.getElementById("lightbox-img");
    var caption = document.getElementById("lightbox-caption");
    var closeBtn = box.querySelector(".lightbox-close");
    var lastFocused = null;

    function open(src, alt, text) {
      lastFocused = document.activeElement;
      img.src = src;
      img.alt = alt || "";
      caption.textContent = text || "";
      box.hidden = false;
      box.classList.add("is-open");
      document.body.style.overflow = "hidden";
      closeBtn.focus();
    }

    function close() {
      box.classList.remove("is-open");
      box.hidden = true;
      img.src = "";
      document.body.style.overflow = "";
      if (lastFocused) lastFocused.focus();
    }

    document.addEventListener("click", function (event) {
      var trigger = event.target.closest("[data-lightbox]");
      if (trigger) {
        event.preventDefault();
        var thumb = trigger.querySelector("img");
        open(
          trigger.getAttribute("href") || (thumb && thumb.src),
          thumb ? thumb.alt : "",
          trigger.getAttribute("data-caption") || ""
        );
        return;
      }
      if (event.target === box || event.target === closeBtn) close();
    });

    document.addEventListener("keydown", function (event) {
      if (event.key === "Escape" && !box.hidden) close();
    });
  }

  // -- 3. Year stamp -------------------------------------------------------
  // Any <span class="js-year"> is set to the current year, so the CV footer
  // and copyright line never go stale.
  function initYear() {
    var year = String(new Date().getFullYear());
    document.querySelectorAll(".js-year").forEach(function (el) {
      el.textContent = year;
    });
  }

  function init() {
    initReveal();
    initLightbox();
    initYear();
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", init);
  } else {
    init();
  }
})();
</script>
